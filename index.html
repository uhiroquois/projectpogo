<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Oswald' rel='stylesheet'>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/4RvPH6vB/logodraxile.png">
    <a href="http://www.rw-designer.com/cursor-set/red-and-black-3"></a>
 
    <title>Project Pogo</title>
    <style>
    * {
        box-sizing: border-box;
    }
    html {
  scroll-behavior: smooth;
    }
    body {
        margin: 0;
        font-family: Oswald;
        background-image: url('https://i.ibb.co/RdWw2N0/bgdraxile.png');
        background-size: 300px 300px;
        color: rgb(177, 5, 28);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        cursor: url('http://www.rw-designer.com/cursor-extern.php?id=152527'), auto;
    }
    header {
    text-align: center;
      font-family: Montserrat;
      margin-top: clamp(100px, 20vh, 400px);
      font-size: clamp(18px, 4vw, 24px);
    }

    .subtitle {
        font-size: 0.55em;
        margin-top: -0.625rem;
        font-family: 'Cascadia Mono';
        margin-bottom: 2.5rem;
        color: rgb(148, 6, 20);
    }

    main {
        flex: 1;
    }

    ::-webkit-scrollbar {
      width: 10px;
      background: black;
    }
    ::-webkit-scrollbar-track {
      background: black;
    }
    ::-webkit-scrollbar-thumb {
      background-color: rgb(177, 5, 28);
      border-radius: 0px;
      border: none;
    }

    .text-background {
      background-color: rgba(0, 0, 0, 0.3);
      width: 100%;
      display: block;
      padding: 0.625rem 0.625rem;
      text-align: center;
    }

    .dino {
        display: block;
        margin: 0 auto;
        max-width: 100%;
        height: auto;
        width: clamp(100px, 15vw, 120px);
    }
    .jo {
        position: fixed;
        bottom: 0;
        left: 0;
        z-index: -1;
        opacity: 0.3;
        width: clamp(500px, 10vw, 550px);
        height: auto;
    }

    @media (max-width: 768px) {
        .jo {
            width: 300px;
            left: -60px;
        }
    }

    ::selection {
        background: rgb(177, 5, 28);
        color: rgb(0, 0, 0);
    }
    footer {
        text-align: center;
        font-family: 'Cascadia Mono';
        font-size: 0.8em;
        color: rgb(148, 6, 25);
    }

    </style>
</head>

<body>
    <header>
        <br><br><br>
        <div class="text-background">
            <h1>project pogo</h1>
            <p class="subtitle">home of good, bad, and unfinished ideas</p>    
        </div>
        
    </header>

    <main>
        <br>
        <p class="text-background">Nothing for now</p>
        <br>
        <img src="https://i.ibb.co/RGR3M8Qv/lastspinningdino.gif" alt="spinningdinosaur" border="0" class="dino">
        
             <img src="https://i.ibb.co/ytMgbjB/jo.png" alt="jo" border="0" class="jo"> 
    </main>

    <footer class="text-background">
        © 2026 Project Pogo
    </footer>
</body>
</html>
